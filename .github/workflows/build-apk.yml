name: Build Expo Android APK
on:
  workflow_dispatch:
    inputs:
      repo_owner_name:
        description: "Your Repo (format: owner/repo)"
        required: true
        default: "OMKARREDDY8570/attendanceapp"
      jdkVersion:
        description: "OpenJDK version"
        required: false
        default: "17"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repo_owner_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.jdkVersion }}

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild Android Folder
        run: npx expo prebuild --platform android --non-interactive

      - name: Build APK with Gradle
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mits-attendance-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 1
