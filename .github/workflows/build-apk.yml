name: Build Expo Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install & Prebuild
        run: |
          npm install --legacy-peer-deps
          rm -rf android
          CI=1 npx expo prebuild --platform android --clean

      - name: Manual Gradle Patch
        # This fixes the "unknown property" error by manually defining the version
        run: |
          sed -i 's/kotlinVersion/ext.kotlinVersion = "2.0.21"/g' android/build.gradle
          sed -i 's/kotlinVersion/"2.0.21"/g' android/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: attendance-app
          path: android/app/build/outputs/apk/release/*.apk
