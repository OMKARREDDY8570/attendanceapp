name: Build Expo Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install & Prebuild
        run: |
          npm install --legacy-peer-deps
          rm -rf android
          CI=1 npx expo prebuild --platform android --clean

      - name: Force Kotlin 2.0.21
        # This overrides the 1.9.24 default that is crashing the build
        run: |
          echo "expo.kotlinVersion=2.0.21" >> android/gradle.properties
          echo "kotlinVersion=2.0.21" >> android/gradle.properties

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mits-attendance-apk
          path: android/app/build/outputs/apk/release/*.apk
